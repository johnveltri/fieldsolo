<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FieldSolo — design system preview</title>
    <link rel="stylesheet" href="../fonts.css" />
    <style>
      :root {
        font-family: 'Ubuntu Sans Mono', ui-monospace, monospace;
        background: #faf6f0;
        color: #2b3441;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      h1 {
        font-family: 'PT Serif', Georgia, 'Times New Roman', serif;
        font-weight: 700;
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      p.note {
        font-size: 14px;
        max-width: 42rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>FieldSolo</h1>
    <p class="note">
      This page loads <strong>Ubuntu Sans Mono</strong> and <strong>PT Serif</strong> via
      <code>design-system/fonts.css</code>. Open the DS React components in a bundler that
      imports that stylesheet at the app root.
    </p>
  </body>
</html>
